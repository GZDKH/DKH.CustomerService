name: Sync issue status to project board

on:
  issues:
    types: [opened, labeled, closed, reopened]

permissions:
  issues: read

jobs:
  sync-board:
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request == null
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const PROJECT_ID = 'PVT_kwDOBvIzdM4BNqa-';
            const STATUS_FIELD = 'PVTSSF_lADOBvIzdM4BNqa-zg8l5p0';
            const STATUS_OPTIONS = {
              'backlog':     'f75ad846',
              'ready':       '61e4505c',
              'in-progress': '47fc9ee4',
              'in-review':   'df73e18b',
              'done':        '98236657',
            };

            const issue = context.payload.issue;
            const action = context.payload.action;
            let targetStatus = null;

            if (action === 'closed') {
              targetStatus = 'done';
            } else if (action === 'reopened') {
              targetStatus = 'in-progress';
            } else if (action === 'labeled') {
              const label = context.payload.label.name;
              if (label.startsWith('status:')) {
                targetStatus = label.replace('status:', '');
              }
            }

            // Always ensure item is on the board (opened or any status change)
            const addResult = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item { id }
                }
              }
            `, { projectId: PROJECT_ID, contentId: issue.node_id });

            const itemId = addResult.addProjectV2ItemById.item.id;
            core.info(`Board item: ${itemId}`);

            if (targetStatus && STATUS_OPTIONS[targetStatus]) {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId,
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId: PROJECT_ID,
                itemId: itemId,
                fieldId: STATUS_FIELD,
                optionId: STATUS_OPTIONS[targetStatus],
              });
              core.info(`Moved to ${targetStatus}`);
            }

            // Clean up status labels (keep only the latest)
            if (action === 'labeled' && context.payload.label.name.startsWith('status:')) {
              const currentLabel = context.payload.label.name;
              for (const label of issue.labels) {
                if (label.name.startsWith('status:') && label.name !== currentLabel) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: label.name,
                  }).catch(() => {});
                }
              }
            }
